{% extends "base.html" %}

{% block title %}AirIQ — Login{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-bg-grid"></div>
  <div class="container position-relative">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <div class="auth-card">

          <!-- Header -->
          <div class="auth-card-header text-center mb-4">
            <div class="auth-icon-wrap mb-3">
              <i class="bi bi-wind"></i>
            </div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to access real-time air quality data</p>
          </div>

          <!-- Form -->
          <form method="POST" action="{{ url_for('login') }}" novalidate>

            <div class="form-group mb-3">
              <label class="form-label-custom" for="username">
                <i class="bi bi-person me-1"></i>Username
              </label>
              <input
                type="text"
                class="form-control-custom"
                id="username"
                name="username"
                placeholder="Enter your username"
                required
                autofocus
              />
            </div>

            <div class="form-group mb-4">
              <label class="form-label-custom" for="password">
                <i class="bi bi-lock me-1"></i>Password
              </label>
              <div class="input-password-wrap">
                <input
                  type="password"
                  class="form-control-custom"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                />
                <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-auth w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>

          </form>

          <div class="auth-divider my-4"><span>New here?</span></div>

          <a href="{{ url_for('register') }}" class="btn-auth-outline w-100">
            <i class="bi bi-person-plus me-2"></i>Create an Account
          </a>

        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('bi-eye', 'bi-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('bi-eye-slash', 'bi-eye');
  }
}
</script>
{% endblock %}
